<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Dreamaze Proof Demo</title>
    <link rel="icon" href="/static/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="lab-shell" aria-label="Dreamaze proof demo">
        <header class="lab-header">
          <div>
            <p class="eyebrow">Dreamaze Proof Demo</p>
            <h1>Conditional Diffusion Solver</h1>
          </div>
          <button id="solve-button" class="solve-button" type="button">
            <span class="button-label">Solve New Maze</span>
            <span class="button-spinner" aria-hidden="true"></span>
          </button>
        </header>

        <div id="status" class="status" role="status" aria-live="polite"></div>
        <div id="result" class="result" aria-live="polite"></div>
      </section>
    </main>
    <script src="/static/app.js"></script>
  </body>
</html>
